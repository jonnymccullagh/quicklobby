name: Build Mod Artifacts

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build archives
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          version="$(tr -d '[:space:]' < version.txt)"
          artifact_base="quicklobby-${version}"

          cp -R quicklobby "dist/${artifact_base}"

          (
            cd dist
            zip -r "${artifact_base}.zip" "${artifact_base}"
            tar -czf "${artifact_base}.tar.gz" "${artifact_base}"
            cp "${artifact_base}.zip" "${artifact_base}.pyromod"
          )

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quicklobby-build-artifacts
          path: |
            dist/*.zip
            dist/*.tar.gz
            dist/*.pyromod
          if-no-files-found: error
